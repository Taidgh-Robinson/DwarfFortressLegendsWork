services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: dflegends
      POSTGRES_USER: dfuser
      POSTGRES_PASSWORD: dfpass
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dfuser -d dflegends"]
      interval: 5s
      timeout: 5s
      retries: 5

  seed:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://dfuser:dfpass@db:5432/dflegends
    volumes:
      - ./a.xml:/app/a.xml
